# Fern reads one source of truth (the OpenAPI spec) and generates
# the docs site, type-safe SDKs, and a CLI from it.
api:
  specs:
    - openapi: ./openapi/openapi.yml

groups:
  ts-sdk:
    generators:
      - name: fernapi/fern-typescript-node-sdk
        version: 0.46.5
        output:
          location: local-file-system
          path: ../generated/typescript
  python-sdk:
    generators:
      - name: fernapi/fern-python-sdk
        version: 4.22.0
        output:
          location: local-file-system
          path: ../generated/python
